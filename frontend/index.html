<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Comment Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="app-container">
        <header>
            <h1><i class="fa-solid fa-code"></i> AI Code Comment Generator</h1>
            <p>Automatically generate insightful English comments for your Python code using NLP.</p>
        </header>

        <main class="editor-container">
            <div class="panel input-panel">
                <div class="panel-header">
                    <h2><i class="fa-brands fa-python"></i> Source Code</h2>
                    <button id="generateBtn" class="btn primary-btn">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Comments
                    </button>
                </div>
                <!-- Textarea for input -->
                <textarea id="codeInput" placeholder="Paste your Python code here..." spellcheck="false">
def calculate_factorial(n):
    if n == 0:
        return 1
    result = 1
    for i in range(1, n + 1):
        result *= i
    return result
</textarea>
            </div>

            <div class="panel output-panel">
                <div class="panel-header">
                    <h2><i class="fa-solid fa-file-code"></i> Commented Code</h2>
                    <button id="copyBtn" class="btn secondary-btn" title="Copy to clipboard">
                        <i class="fa-regular fa-copy"></i> Copy
                    </button>
                </div>
                <div id="outputContainer" class="code-output">
                    <pre><code id="codeOutput" class="language-python">Your commented code will appear here...</code></pre>
                </div>
                <!-- Loading Overlay -->
                <div id="loadingOverlay" class="loading-overlay hidden">
                    <div class="spinner"></div>
                    <p>Analyzing code with NLP...</p>
                </div>
            </div>
        </main>
        
        <div id="toast" class="toast hidden">Copied to clipboard!</div>
    </div>
    
    <!-- PrismJS for syntax highlighting in output -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tommorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
